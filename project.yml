name: VibeStation5

options:
  bundleIdPrefix: com.mcruz
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "2"
    SUPPORTS_MACCATALYST: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ENABLE_MODULES: YES
    DEAD_CODE_STRIPPING: YES

packages:
  Capstone:
    path: Vendor/Capstone

targets:
  VibeStation5:
    type: application
    platform: iOS
    sources:
      - path: VibeStation5
    dependencies:
      - package: Capstone
        product: CCapstone
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mcruz.VibeStation5
        PRODUCT_NAME: VibeStation5
        TARGETED_DEVICE_FAMILY: "2"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: VibeStation5
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIFileSharingEnabled: YES
        INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: YES
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    scheme:
      testTargets:
        - VibeStation5Tests

  VibeStation5-macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: VibeStation5
    dependencies:
      - package: Capstone
        product: CCapstone
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mcruz.VibeStation5.macOS
        PRODUCT_NAME: VibeStation5
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: VibeStation5
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: VibeStation5/VibeStation5.entitlements

  VibeStation5Tests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VibeStation5Tests
    dependencies:
      - target: VibeStation5
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mcruz.VibeStation5Tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO

  VibeStation5Probe:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: VibeStation5/Core
      - path: VibeStation5/Models/RuntimeModels.swift
      - path: VibeStation5/Services/GuestAudioOutput.swift
      - path: VibeStation5/Services/GuestInputManager.swift
      - path: Tools/VibeStation5Probe
    dependencies:
      - package: Capstone
        product: CCapstone
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mcruz.VibeStation5Probe
        PRODUCT_NAME: VibeStation5Probe
        CODE_SIGNING_ALLOWED: NO
